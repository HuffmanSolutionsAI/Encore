# AWS Amplify Hosting build spec for the Encore web app.
# Monorepo layout: this file at the repo root, the Next.js app under `web/`.
#
# `appRoot: web` tells Amplify to cd into web/ before running build commands.
# Amplify auto-detects Next.js 15 and provisions SSR compute (Lambda@Edge or
# Lambda functions) for dynamic routes like /album/[id]. Static routes are
# served from CloudFront directly.

version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 22 || true
            - npm ci --no-audit --no-fund
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
