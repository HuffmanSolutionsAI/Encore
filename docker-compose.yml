# Local Postgres for development. Runs alongside `npm run dev` in api/
# and `npm run dev` in web/. Data persists in a named volume so the DB
# survives `docker compose down`. Use `docker compose down -v` to wipe.

services:
  postgres:
    image: postgres:16-alpine
    container_name: encore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: encore
      POSTGRES_PASSWORD: encore
      POSTGRES_DB: encore
    volumes:
      - encore_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encore -d encore"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  encore_pg_data:
